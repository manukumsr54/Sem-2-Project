<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotify Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <h2 class="logo">Spotify<span>●</span></h2>

    <p>🏠 Home</p>
    <p>🔍 Search</p>
    <p>📚 Your Library</p>
    <p>➕ Create Playlist</p>
    <p>❤️ Liked Songs</p>
  </aside>

  <main class="main">
    <div class="playlist-header">
      <div class="cover"></div>

      <div>
        <p>Playlist</p>
        <h1>My Songs</h1>
        <p>8 songs • Made by You</p>
      </div>
    </div>

    <div class="table-head">
      <span>#</span>
      <span>Title</span>
      <span>Artist</span>
      <span>Duration</span>
    </div>

    <div id="songList"></div>
  </main>
</div>

<div class="player">
  <div class="now">
    <h3 id="songTitle">Select a song</h3>
    <p id="artist">Unknown Artist</p>
  </div>

  <div class="center-player">
    <div class="controls">
      <button onclick="prevSong()">⏮</button>
      <button onclick="playPause()" id="playBtn">▶</button>
      <button onclick="nextSong()">⏭</button>
    </div>

    <input type="range" id="progress" value="0">
  </div>

  <div class="volume">
    🔊 <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>
</div>

<audio id="audio"></audio>

<script src="script.js"></script>
</body>
</html>
